<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agent</title>
<style>
  :root { --accent:#1a73e8; --bg:#f6f8fa; --border:#dfe3e8; }
  * { box-sizing:border-box; }
  body { margin:0; font-family:system-ui,sans-serif; background:var(--bg); display:flex; flex-direction:column; height:100vh; }
  header { background:var(--accent); color:#fff; padding:.9rem 1.2rem; font-weight:700; }
  #log { flex:1; overflow-y:auto; padding:1.2rem; max-width:780px; width:100%; margin:0 auto; }
  .msg { margin:.6rem 0; }
  .msg.user { text-align:right; }
  .bubble { display:inline-block; padding:.6rem .9rem; border-radius:12px; background:#fff; border:1px solid var(--border); text-align:left; max-width:90%; }
  .msg.user .bubble { background:var(--accent); color:#fff; border:none; }
  form { display:flex; gap:.5rem; padding:1rem; border-top:1px solid var(--border); background:#fff; }
  input { flex:1; padding:.7rem; border:1px solid var(--border); border-radius:8px; font-size:1rem; }
  button { padding:.7rem 1.1rem; border:none; border-radius:8px; background:var(--accent); color:#fff; font-weight:600; cursor:pointer; }
  /* --- minimal A2UI component styles (starter — swap for the official renderer) --- */
  .a2-card { border:1px solid var(--border); border-radius:10px; padding:.9rem 1rem; margin:.4rem 0; background:#fff; box-shadow:0 1px 2px rgba(0,0,0,.05); }
  .a2-card h3 { margin:0 0 .2rem; }
  .a2-sub { color:#666; font-size:.9rem; margin-bottom:.4rem; }
  .a2-table { border-collapse:collapse; width:100%; margin:.4rem 0; }
  .a2-table th, .a2-table td { border:1px solid var(--border); padding:.4rem .6rem; text-align:left; font-size:.9rem; }
  .a2-table th { background:#f1f3f5; }
  .a2 img { max-width:100%; border-radius:8px; }
  .a2-unknown { font-family:monospace; font-size:.8rem; color:#a33; white-space:pre-wrap; }
</style>
</head>
<body>
<header>Your Agent</header>
<div id="log"></div>
<form id="form">
  <input id="input" placeholder="Ask something…" autocomplete="off" autofocus>
  <button>Send</button>
</form>

<script>
const log = document.getElementById("log");
const form = document.getElementById("form");
const input = document.getElementById("input");

function el(tag, cls, text) { const e = document.createElement(tag); if (cls) e.className = cls; if (text != null) e.textContent = text; return e; }

function bubble(who) {
  const m = el("div", "msg " + who);
  const b = el("div", "bubble");
  m.appendChild(b); log.appendChild(m); log.scrollTop = log.scrollHeight;
  return b;
}

// --- Minimal A2UI renderer -------------------------------------------------
// Handles the common Basic Catalog components. A2UI nodes look like
//   { "type": "Card", "props": {...}, "children": [ ... ] }
// For full fidelity, replace this with the official renderer from a2ui.org.
function renderA2UI(node) {
  if (node == null) return document.createTextNode("");
  if (typeof node === "string") return el("span", null, node);
  const t = node.type, p = node.props || {}, kids = node.children || [];
  let e;
  switch (t) {
    case "Card": e = el("div", "a2 a2-card"); if (p.title) e.appendChild(el("h3", null, p.title)); if (p.subtitle) e.appendChild(el("div", "a2-sub", p.subtitle)); break;
    case "Heading": e = el("h3", "a2", p.text || p.title || ""); break;
    case "Text": e = el("p", "a2", p.text || p.value || ""); break;
    case "Image": e = el("span", "a2"); { const img = document.createElement("img"); img.src = p.src || p.url || ""; img.alt = p.alt || ""; e.appendChild(img); } break;
    case "Button": e = el("button", "a2", p.label || p.text || "Button"); break;
    case "Table": e = renderTable(p); break;
    default: e = el("div", "a2 a2-unknown", JSON.stringify(node, null, 2));
  }
  (kids || []).forEach(k => e.appendChild(renderA2UI(k)));
  return e;
}

function renderTable(p) {
  const table = el("table", "a2 a2-table");
  const cols = p.columns || p.headers || (p.rows && p.rows[0] && Object.keys(p.rows[0])) || [];
  if (cols.length) {
    const tr = el("tr");
    cols.forEach(c => tr.appendChild(el("th", null, typeof c === "object" ? (c.label || c.key) : c)));
    table.appendChild(tr);
  }
  (p.rows || p.data || []).forEach(row => {
    const tr = el("tr");
    (Array.isArray(row) ? row : cols.map(c => row[typeof c === "object" ? c.key : c])).forEach(cell => tr.appendChild(el("td", null, cell == null ? "" : String(cell))));
    table.appendChild(tr);
  });
  return table;
}

// --- Chat ------------------------------------------------------------------
form.addEventListener("submit", async (ev) => {
  ev.preventDefault();
  const text = input.value.trim();
  if (!text) return;
  bubble("user").textContent = text;
  input.value = "";
  const b = bubble("agent"); b.textContent = "…";
  try {
    const res = await fetch("/chat", { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ message: text }) });
    const data = await res.json();
    b.textContent = "";
    for (const part of (data.parts || [])) {
      if (part.kind === "a2ui") b.appendChild(renderA2UI(part.data));
      else b.appendChild(el("div", null, part.text || ""));
    }
  } catch (e) {
    b.textContent = "Error: " + e.message;
  }
});
</script>
</body>
</html>
