# Introduction

In this lab, you'll learn how to build your own agent-first application using Google Cloud tools.

You will:

- Prototype an agent using `agents-cli`
- Equip your agent with an enterprise-ready harness that includes Memory, Sessions, Tools, Persistent Storage, and code execution
- Evaluate and improve the quality of your agent's responses
- Deploy your agent to Agent Platform
- Equip your agent with the power to use Google's Generative Models
- Build an agent-first frontend, hosted on Cloud Run and powered by A2UI

## How this workshop works

- **Part 1 — Basics.** Together we'll build a simple example agent — the **Alchemist's Apothecary**, a magical potions shop — to learn the basics: how to create an agent and test it locally in the Playground.
- **Part 2 — Your agent.** Brainstorm your *own* agent-powered idea and productionize it with state & memory, tools, rich UI, evaluation, deployment, and a frontend.

The Apothecary is just *our* example — in Part 2 you'll build whatever is most relevant and exciting to you, and you can diverge whenever you like.

> **Why skills matter:** by packaging the right steps and context up front, skills save tokens and time and improve accuracy — the agent completes a task in fewer steps, instead of rediscovering (and sometimes getting wrong) the workflow every time.

## Tour the Playground

The Playground is where a lot of this workshop's core concepts become *visible*. Chat with your agent, then walk through the panels — each one maps to a concept you'll use later.

> 🎤 **Presenter note — slow down here.** The Playground UI is the most concrete way to explain sessions, state, artifacts, traces, and evaluation, because you can point at each on screen. Walk the panels below in order; you'll need ~one slide at most. The "breakpoint" at the end teases the two things that *aren't* here by default — memory and external storage — which sets up Part 2.

### Sessions & state

Chat with your agent, then open the **Sessions** view and the **State** panel.

> 🎤 **Presenter note — session vs. state (the confusing one):**
> - A **session** is a single conversation thread: its chronological messages/actions (*events*) plus a little scratch data (*state*). The Sessions view lets you see and switch threads.
> - **State** (the State panel) is that scratch data — a key-value dictionary belonging to the *current session*. It's "what the agent is tracking during this chat" (e.g., items in a cart, a preference the user just mentioned).
> - So **state is part of a session**, not a separate thing. Locally, sessions and state live **in memory**, so they **reset when the Playground restarts** — fine for testing.
> - *(Optional/advanced: state keys can be prefixed — `user:` persists across a user's sessions, `app:` is shared app-wide — but you don't need that today.)*

### Artifacts

> 🎤 **Presenter note — artifacts:** The **Artifacts** panel shows files/blobs the agent produced or was handed — images, documents, generated media. They're stored separately from state (binary data would bloat it); state just holds a reference. **Locally they're in-memory and vanish on restart; to make them durable you back the ArtifactService with a Cloud Storage (GCS) bucket** — i.e. swap `InMemoryArtifactService` → `GcsArtifactService`. (Same pattern as sessions: local = ephemeral, production = pick a durable backend.) This is where generated images/videos will appear once we add generative tools in Part 2.

### Traces

Open the **Traces** tab and look at what your last message actually did.

> 🎤 **Presenter note — traces → tools:** Right now a trace is boring — a single direct **LLM call**, because the agent can only talk. That's the perfect jumping-off point to introduce **tools**: functions the agent can call to *do* things. Once we add tools in Part 2, each tool call shows up here, and this tab becomes how you debug what the agent actually did.

> 🖼️ **SCREENSHOT NEEDED** — The Traces tab showing a single direct LLM call (no tools yet).

## The breakpoint — what's *not* here by default

The Playground showed you the parts of an agent that are on by default. A few important kinds of persistence are **not** — and they're exactly what you'll add to your own agent. It helps to think in two axes: **structured vs. binary** data, and **conversation-scoped vs. owned by your app**.

| Kind of state | What it holds | On by default? |
| --- | --- | --- |
| **Session** (events + **state**) | The current conversation (text/scratch) | ✅ Yes — you just saw it |
| **Artifacts** | Binary files the agent makes/uses (this session or user) | ✅ Yes — the Artifacts panel |
| **Memory** | Long-term facts, searchable *across* sessions | ❌ No — you enable it |
| **External storage** (Firebase / Cloud SQL) | *Your app's* structured data (inventory, orders) | ❌ No — you wire it up |
| **Blob storage** (Cloud Storage / GCS) | *Your app's* raw files (bulk/static assets) | ❌ No — you wire it up |

> 🎤 **Presenter note — memory vs. storage (the second confusing one):**
> - **Memory** is a *searchable, cross-session* store — how the agent recalls something from a *previous* conversation. Different from session state (state is this-conversation-only), and **not enabled by default**.
> - **External storage** (Firebase, Cloud SQL) is *your application's own database* — the domain data your agent reads and writes (the shop's inventory, a user's orders). It isn't an ADK conversation construct at all; it's your app's source of truth.
> - The one-liner: **sessions/state/artifacts are about the *conversation*; memory and external storage are about everything that outlives it.**

> 🎤 **Presenter note — artifacts vs. blob storage (they're related!):**
> - **Artifacts *are* blob data.** Under the hood, persistent artifacts are stored in **Cloud Storage (GCS)** — so the difference is the *interface*, not the storage. Artifacts are ADK's agent-aware wrapper: versioned, scoped to a session or user, saved/loaded by the agent during a turn, and visible in the Playground.
> - **Raw blob storage (GCS)** is just a bucket of objects your *app* controls directly — best for files *not* tied to a conversation (a static catalog of product images, public assets your frontend serves, bulk uploads).
> - Rule of thumb: if the **agent** produces/consumes the file as part of its work → **artifact**. If it's your **app's** own file library → **blob storage**.
> - Clean parallel: **artifacts : blob storage :: session state : Cloud SQL** — in each pair, the first is conversation-scoped and agent-managed, the second is your app's own store.

## Long-Term Memory

Right now your agent forgets everything the moment a session ends. Prove it: start a fresh session and ask it to recall something from an earlier chat — it can't.

> 🖼️ **SCREENSHOT NEEDED** — A fresh session where the agent fails to recall a fact from a previous conversation.

**Long-term memory** fixes this. In ADK, memory is a searchable, cross-session store provided by a `MemoryService`; the managed option is **Vertex AI Memory Bank**, which uses Gemini to extract durable facts (e.g. "this customer prefers calming potions") and recall them later. Turn it on:

```

```

## Persistent Storage for App Data

<!-- owner: Dale Markowitz (dalequark@google.com) -->

Earlier, we talked about three kinds of conversational storage: **sessions**, **state**, and **artifacts**. But those are specific to the conversation itself. We often also want our agents to read and write **application data** that lives outside any chat — inventory, user profiles, order history, saved preferences, or transaction logs. This falls into two buckets:

- **Structured data** (inventory, orders, user records) → a database like **Firestore** (serverless, simple) or **Cloud SQL**. Your agent reaches it through a **function tool** (see *Add Tools*).
- **Raw files/blobs** (bulk images, static assets) → **Cloud Storage (GCS)**. *(Files the agent produces during a conversation should be **artifacts** instead — which are themselves backed by GCS.)*

For our Apothecary, we'll create a database to store inventory. We'll use **Firestore** (though you could swap in Cloud SQL or Spanner).

First, give Antigravity the ability to manage Firebase by installing the **Firebase MCP**:

```
Install the Firebase MCP so you can create and manage a Firestore database for me.
```

Then have it stand up a Firestore backend, describe the schema at a high level, and wire it to your agent with function tools:

```
Add a Firestore backend for my agent. For the Apothecary, create a "potions" collection where each document has name, potency, price, and stock. Add function tools so my agent can read and write it, and seed a few sample potions.
```

> ⚠️ Heads-up: this step commonly trips on **auth/permissions**. If you hit errors, run `Check my setup.` and confirm the Firestore API is enabled and your identity (and later your Cloud Run service account) can access it.

Test it: ask the agent something only its data can answer — for the Apothecary, *"How many healing potions are in stock?"* — and confirm it reads from Firestore through the tool.

You can watch the data live in the **Firebase console → Firestore Database**. A nice property of Firestore is that it's **real-time**: as your agent writes (say, selling a potion decrements stock), the document updates instantly in the browser — great for live demos and debugging.

## Add Tools

<!-- owner: Christina Zhu (cszhu@google.com) -->

Right now, your agent can only talk. **Tools** are functions your agent can call to actually *do* things: query a database, hit an API, process a transaction, do math, generate media. This is when your agent stops being a chatbot and starts doing real work — and each tool call shows up in the Traces tab you saw in Part 1.

What kind of tool you need depends on your application. If you set up persistent storage above, your agent already uses a tool to read and write its database. You'll often also want a tool that carries out a fixed business action — for the Apothecary, completing a sale:

```
Add a tool to my agent that processes a potion purchase: given a potion name and quantity, check stock in Firestore, decrement it, record the order, and return a receipt.
```

Test it in the Playground. Ask the agent to do something the tool enables — for the Apothecary, *"I'll take two healing potions"* — and confirm the tool call shows up in the Traces tab.

### Run Code in a Sandbox

A special kind of tool: sometimes your agent needs to *compute* — do math, analyze data, generate a stat or a chart. Agent Runtime offers code execution in an isolated **sandbox** (distinct from the local chat sandbox in Part 1): your agent writes and runs Python safely, and it never touches your host.

*Example (Apothecary):* *"Chart my potion inventory by potency"* — the agent writes Python to aggregate the stock and returns a chart image.

Prereqs: the Agent Platform API enabled, and your agent's identity has `roles/aiplatform.user`.

```
Add Agent Runtime code execution to my agent using AgentEngineSandboxCodeExecutor so it can safely run Python in a sandbox. If I don't already have a sandbox, create one from my agent engine resource.
```

Test it with something that needs real computation — for the Apothecary, ask it to chart inventory by potency or price — and confirm the agent runs code in the sandbox and answers from the result. For agents doing data analysis, trading, or coding, this is a superpower.

## Enable Rich Responses with A2UI

<!-- owner: Christina Zhu (cszhu@google.com) -->

Now let's make your agent's replies richer. While plain text is fine, your agent can do better with **A2UI** — it can return real UI: cards, forms, charts, tables. Your agent emits structured JSON (a declarative description of the UI), and a renderer turns it into interactive components. A2UI is open source and easy to add to any ADK agent. (The cool part: your *agent* decides what UI to show.)

This is an agent *capability*, so you can add and test it now, in the Playground, before there's any custom frontend.

```

# Build & Deploy the Frontend

<!-- owner: Christina Zhu (cszhu@google.com) -->

Your agent needs a face. The workshop frontend provided to you is an agent-agnostic **FastAPI proxy + chat UI**: the browser only ever talks to the proxy (same origin, no CORS), and the proxy authenticates to your deployed agent with Application Default Credentials. To point it at *your* agent you set one env var; to reskin it you edit one config file. It also renders the A2UI payloads your agent already emits.

## Test the frontend locally

Before deploying the frontend, confirm your code can reach the agent you just deployed. "Locally" just means the frontend server runs on your machine instead of Cloud Run, but it talks to the same deployed endpoint — so you catch wiring issues before shipping.

Run all of these from the `frontend/` folder. First time only, install its dependencies:

```bash
pip install -r requirements.txt
```

1. Point the frontend at your deployed agent using the resource name from the deploy step:

```bash
export AGENT_ENGINE_RESOURCE_NAME="<paste the resource name from deployment_metadata.json>"
```

2. Start the frontend server (it listens on `http://localhost:8080`):

```bash
python main.py
```

3. Open [`http://localhost:8080`](http://localhost:8080) and you should see your UI. Ask for something that returns a card or table and confirm the A2UI renders.
4. Send a message, then in the same chat ask "What did I just ask?" to confirm a real session is wired up. If it can't remember, check the resource deployment from the earlier step.

Make sure the frontend renders A2UI, falling back to plain text for normal replies:

```
Update the frontend to detect A2UI payloads (mimeType application/json+a2ui) and render them, falling back to plain text for normal replies.
```

## Deploy to Cloud Run (and the auth story)

The frontend deploys differently from the agent. You used `agents-cli` to deploy the agent to **Agent Platform**; the frontend is a separate custom web app, so you ship it to Cloud Run with `gcloud`. The agent lives in Agent Platform; the frontend lives in Cloud Run and talks to the agent. This is the recommended pattern for a custom UI.

Here's the auth gotcha: the Cloud Run service runs as a **different service identity** than your local user, so its service account needs `roles/aiplatform.user` or `/chat` will error out.

```
Deploy the frontend to Cloud Run pointing at my AGENT_ENGINE_RESOURCE_NAME, and grant the Cloud Run service account roles/aiplatform.user so it can reach the agent.
```

Or run it directly:

```bash
gcloud run deploy <your-frontend-name> \
  --source . \
  --region <your-region> \
  --allow-unauthenticated \
  --set-env-vars="AGENT_ENGINE_RESOURCE_NAME=$AGENT_ENGINE_RESOURCE_NAME"
```

<script>
  const MD_PATH = "../Gemini World 3 QwikLab 2.0.md";

  // Google Docs export escapes punctuation with backslashes (\`, \[, \!, \<, ...).
  // Strip those so markdown renders cleanly.
  function unescapeGdocs(src) {
    return src.replace(/\\([\\`*_{}\[\]()#+\-.!<>|~"'@$%^&=:;,/])/g, "$1");
  }

  function slugify(text) {
    return text.toLowerCase().replace(/<[^>]+>/g, "").replace(/[^\w]+/g, "-").replace(/^-+|-+$/g, "");
  }

  // Strip markdown links / author mailto tags from a heading for the nav label.
  function cleanLabel(text) {
    return text.replace(/\[([^\]]+)\]\([^)]*\)/g, "$1").trim();
  }

  let lastRaw = null;

  function render(raw) {
    const cleaned = unescapeGdocs(raw);
    const html = marked.parse(cleaned, { gfm: true, breaks: false });
    const content = document.getElementById("content");
    content.innerHTML = html;

    // Flag placeholder callouts so they stand out from real ones
    content.querySelectorAll("blockquote").forEach(bq => {
      const t = bq.textContent || "";
      if (/Presenter note/i.test(t)) bq.classList.add("ph-presenter");
      else if (/SCREENSHOT|DEMO/.test(t)) bq.classList.add("ph-image");
      else if (/TODO:/.test(t)) bq.classList.add("ph-todo");
    });

    // Hero title from first H1
    const firstH1 = content.querySelector("h1");
    if (firstH1) document.getElementById("hero-title").textContent = cleanLabel(firstH1.textContent);

    // Build sidebar from H1s; assign ids for anchoring
    const toc = document.getElementById("toc");
    toc.innerHTML = "";
    const heads = content.querySelectorAll("h1");
    heads.forEach((h, i) => {
      const id = h.id || slugify(h.textContent) || ("sec-" + i);
      h.id = id;
      // Flag empty TODO sections visually
      let label = cleanLabel(h.textContent);
      const a = document.createElement("a");
      a.href = "#" + id;
      a.textContent = label;
      a.dataset.target = id;
      if (/todo/i.test(label)) { a.style.color = "#f0a35e"; }
      toc.appendChild(a);
    });

    setupScrollSpy();
  }

  function setupScrollSpy() {
    const links = [...document.querySelectorAll("#toc a")];
    const map = links.map(a => ({ a, el: document.getElementById(a.dataset.target) })).filter(x => x.el);
    function onScroll() {
      let current = map[0];
      for (const m of map) {
        if (m.el.getBoundingClientRect().top <= 120) current = m;
      }
      links.forEach(a => a.classList.remove("active"));
      if (current) current.a.classList.add("active");
    }
    window.removeEventListener("scroll", window.__spy || (()=>{}));
    window.__spy = onScroll;
    window.addEventListener("scroll", onScroll, { passive: true });
    onScroll();
  }

  async function load(initial) {
    try {
      const res = await fetch(encodeURI(MD_PATH) + "?t=" + Date.now(), { cache: "no-store" });
      if (!res.ok) throw new Error("HTTP " + res.status);
      const raw = await res.text();
      if (raw !== lastRaw) {
        const y = window.scrollY;
        lastRaw = raw;
        render(raw);
        if (!initial) window.scrollTo(0, y); // preserve scroll on live reload
        blinkDot();
      }
    } catch (e) {
      if (initial) {
        document.getElementById("content").innerHTML =
          '<div id="status">Could not load the markdown.<br><br><code>' + e.message +
          '</code><br><br>Make sure the dev server is running from the project root.</div>';
      }
    }
  }

  function blinkDot() {
    const dot = document.getElementById("dot");
    dot.style.opacity = "0.2";
    setTimeout(() => (dot.style.opacity = "1"), 250);
  }

  // Presenter-notes toggle (persisted across reloads)
  const toggle = document.getElementById("toggle-presenter");
  const savedPref = localStorage.getItem("showPresenter");
  const showPresenter = savedPref === null ? true : savedPref === "true";
  toggle.checked = showPresenter;
  document.body.classList.toggle("hide-presenter", !showPresenter);
  toggle.addEventListener("change", () => {
    document.body.classList.toggle("hide-presenter", !toggle.checked);
    localStorage.setItem("showPresenter", toggle.checked);
  });

  // Inline markdown (built/hosted single file) vs. live fetch (local dev)
  const inlineEl = document.getElementById("md-inline");
  const inlineMd = inlineEl ? inlineEl.textContent.trim() : "";
  if (inlineMd) {
    document.getElementById("footer-status").textContent = "Gemini World · Track 3";
    render(inlineMd);
  } else {
    load(true);
    setInterval(() => load(false), 1500); // live reload: poll every 1.5s
  }
</script>
</body>
</html>
